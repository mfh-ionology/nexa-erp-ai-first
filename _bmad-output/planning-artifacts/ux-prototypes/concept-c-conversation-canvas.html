<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Bricolage Grotesque', sans-serif; background: #0c0a1a; color: #e2e8f0; overflow: hidden; height: 100vh; }
.font-mono-num { font-family: 'DM Mono', monospace; }
.gradient-text { background: linear-gradient(135deg, #14b8a6, #8b5cf6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
.gradient-border { border: 1px solid transparent; background-clip: padding-box; position: relative; }
.gradient-border::before { content: ''; position: absolute; inset: -1px; border-radius: inherit; padding: 1px; background: linear-gradient(135deg, rgba(20,184,166,0.4), rgba(139,92,246,0.4)); -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0); -webkit-mask-composite: xor; mask-composite: exclude; pointer-events: none; }
.ai-border-left { border-left: 3px solid transparent; border-image: linear-gradient(to bottom, #14b8a6, #8b5cf6) 1; }
.user-border-left { border-left: 3px solid #334155; }
.card-enter { animation: cardEnter 0.4s ease-out forwards; opacity: 0; transform: scale(0.95) translateY(10px); }
@keyframes cardEnter { to { opacity: 1; transform: scale(1) translateY(0); } }
.msg-enter { animation: msgEnter 0.35s ease-out forwards; opacity: 0; transform: translateY(15px); }
@keyframes msgEnter { to { opacity: 1; transform: translateY(0); } }
.typing-dot { width: 8px; height: 8px; border-radius: 50%; background: #14b8a6; display: inline-block; animation: typingBounce 1.2s infinite; }
.typing-dot:nth-child(2) { animation-delay: 0.2s; }
.typing-dot:nth-child(3) { animation-delay: 0.4s; }
@keyframes typingBounce { 0%, 60%, 100% { transform: translateY(0); opacity: 0.4; } 30% { transform: translateY(-8px); opacity: 1; } }
.check-circle { stroke-dasharray: 166; stroke-dashoffset: 166; animation: checkDraw 0.6s ease forwards; }
.check-mark { stroke-dasharray: 48; stroke-dashoffset: 48; animation: checkDraw 0.3s 0.4s ease forwards; }
@keyframes checkDraw { to { stroke-dashoffset: 0; } }
.input-glow:focus-within { box-shadow: 0 0 20px rgba(20,184,166,0.15), 0 0 40px rgba(139,92,246,0.1); }
.input-glow { transition: box-shadow 0.3s ease; }
.sidebar-btn { transition: all 0.2s ease; }
.sidebar-btn:hover { transform: scale(1.02); box-shadow: 0 0 15px rgba(139,92,246,0.2); }
.sidebar-btn.active { background: linear-gradient(135deg, rgba(20,184,166,0.15), rgba(139,92,246,0.15)); border-color: rgba(139,92,246,0.4); }
.status-overdue { background: rgba(248,113,113,0.15); color: #f87171; }
.status-due { background: rgba(251,191,36,0.15); color: #fbbf24; }
.status-paid { background: rgba(52,211,153,0.15); color: #34d399; }
.status-draft { background: rgba(148,163,184,0.15); color: #94a3b8; }
.status-posted { background: rgba(20,184,166,0.15); color: #14b8a6; }
.conv-stream { scrollbar-width: thin; scrollbar-color: rgba(139,92,246,0.3) transparent; }
.conv-stream::-webkit-scrollbar { width: 6px; }
.conv-stream::-webkit-scrollbar-track { background: transparent; }
.conv-stream::-webkit-scrollbar-thumb { background: rgba(139,92,246,0.3); border-radius: 3px; }
.sparkline-up { color: #34d399; }
.sparkline-down { color: #f87171; }
.scenario-card { transition: all 0.2s ease; cursor: pointer; }
.scenario-card:hover { transform: translateY(-2px); box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
.step-card { animation: stepIn 0.5s ease-out forwards; opacity: 0; }
@keyframes stepIn { to { opacity: 1; } }
.bg-mesh { background-image: radial-gradient(at 20% 80%, rgba(20,184,166,0.03) 0%, transparent 50%), radial-gradient(at 80% 20%, rgba(139,92,246,0.03) 0%, transparent 50%), radial-gradient(at 50% 50%, rgba(20,184,166,0.02) 0%, transparent 70%); }
.inv-row { transition: background 0.15s ease; cursor: pointer; }
.inv-row:hover { background: rgba(139,92,246,0.08); }
.ai-analysis-enter { animation: analysisSlide 0.5s ease-out forwards; opacity: 0; max-height: 0; overflow: hidden; }
@keyframes analysisSlide { to { opacity: 1; max-height: 600px; } }
.quick-reply { transition: all 0.2s ease; }
.quick-reply:hover { background: linear-gradient(135deg, rgba(20,184,166,0.2), rgba(139,92,246,0.2)); border-color: rgba(139,92,246,0.5); transform: translateY(-1px); }
.progress-bar-fill { background: linear-gradient(90deg, #14b8a6, #8b5cf6); }

<body class="bg-nxbg text-nxtxt">

<!-- TOP BAR -->
<div class="fixed top-0 left-0 right-0 h-14 bg-nxsurface/80 backdrop-blur-xl border-b border-violet-500/10 flex items-center justify-between px-5 z-50">
  <div class="flex items-center gap-3">
    <div class="w-8 h-8 rounded-lg flex items-center justify-center" style="background: linear-gradient(135deg, #14b8a6, #8b5cf6);">
      <span class="text-white font-bold text-sm">N</span>
    </div>
    <span class="font-heading font-bold text-lg gradient-text">NEXA</span>
    <div class="ml-4 flex items-center gap-2 px-3 py-1.5 rounded-lg bg-nxbg/50 border border-violet-500/10 cursor-pointer hover:border-violet-500/30 transition-colors">
      <svg class="w-4 h-4 text-nxtxt2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
      <span class="text-sm text-nxtxt2">Conversations</span>
      <svg class="w-3 h-3 text-nxtxt2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
    </div>
  </div>
  <div class="flex items-center gap-3 text-sm text-nxtxt2">
    <span class="font-mono-num text-xs opacity-60">Mon 17 Feb 2026</span>
    <span class="opacity-30">|</span>
    <span class="text-xs opacity-60">Meridian Manufacturing Ltd</span>
    <div class="relative cursor-pointer ml-2">
      <svg class="w-5 h-5 text-nxtxt2 hover:text-nxtxt transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/></svg>
      <span class="absolute -top-1 -right-1 w-4 h-4 rounded-full text-[10px] font-bold flex items-center justify-center text-white" style="background: linear-gradient(135deg, #14b8a6, #8b5cf6);">3</span>
    </div>
    <div class="w-8 h-8 rounded-full flex items-center justify-center text-sm font-bold cursor-pointer" style="background: linear-gradient(135deg, rgba(20,184,166,0.3), rgba(139,92,246,0.3));">SC</div>
  </div>
</div>

<!-- MAIN LAYOUT -->
<div class="flex h-screen pt-14">
  <!-- CONVERSATION AREA -->
  <div class="flex-1 flex flex-col relative bg-mesh">
    <!-- Conversation Stream -->
    <div id="convStream" class="conv-stream flex-1 overflow-y-auto px-4 py-6">
      <div id="convContent" class="max-w-3xl mx-auto space-y-4"></div>
    </div>
    <!-- Input Bar -->
    <div class="px-4 pb-5 pt-2">
      <div class="max-w-3xl mx-auto">
        <div class="input-glow rounded-2xl border border-violet-500/20 bg-nxsurface/60 backdrop-blur-sm p-1 flex items-center gap-2 focus-within:border-violet-500/40">
          <input id="chatInput" type="text" placeholder="Type your message..." class="flex-1 bg-transparent px-4 py-3 text-sm text-nxtxt placeholder-nxtxt2/50 outline-none font-heading" onkeydown="if(event.key==='Enter')handleChat()">
          <button onclick="handleChat()" class="w-10 h-10 rounded-xl flex items-center justify-center transition-all hover:scale-105" style="background: linear-gradient(135deg, #14b8a6, #8b5cf6);">
            <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/></svg>
          </button>
        </div>
        <div id="quickReplies" class="flex gap-2 mt-2 flex-wrap"></div>
      </div>
    </div>
  </div>

  <!-- RIGHT SIDEBAR -->
  <div class="w-52 border-l border-violet-500/10 bg-nxsurface/30 backdrop-blur-sm flex flex-col p-3 gap-2 overflow-y-auto">
    <div class="text-[10px] uppercase tracking-widest text-nxtxt2/50 font-heading mb-1 px-2">Quick Actions</div>
    <button onclick="switchView('briefing')" data-view="briefing" class="sidebar-btn active flex items-center gap-2.5 px-3 py-2.5 rounded-xl border border-violet-500/10 bg-nxbg/30 text-sm text-left w-full">
      <span class="text-base">☀️</span><span class="font-heading text-nxtxt">Briefing</span>
    </button>
    <button onclick="switchView('invoices')" data-view="invoices" class="sidebar-btn flex items-center gap-2.5 px-3 py-2.5 rounded-xl border border-violet-500/10 bg-nxbg/30 text-sm text-left w-full">
      <span class="text-base">📄</span><span class="font-heading text-nxtxt">Invoices</span>
    </button>
    <button onclick="switchView('create')" data-view="create" class="sidebar-btn flex items-center gap-2.5 px-3 py-2.5 rounded-xl border border-violet-500/10 bg-nxbg/30 text-sm text-left w-full">
      <span class="text-base">➕</span><span class="font-heading text-nxtxt">Create Invoice</span>
    </button>
    <button onclick="switchView('reports')" data-view="reports" class="sidebar-btn flex items-center gap-2.5 px-3 py-2.5 rounded-xl border border-violet-500/10 bg-nxbg/30 text-sm text-left w-full">
      <span class="text-base">📊</span><span class="font-heading text-nxtxt">P&L Report</span>
    </button>
    <button onclick="switchView('cashflow')" data-view="cashflow" class="sidebar-btn flex items-center gap-2.5 px-3 py-2.5 rounded-xl border border-violet-500/10 bg-nxbg/30 text-sm text-left w-full">
      <span class="text-base">💰</span><span class="font-heading text-nxtxt">Cash Flow</span>
    </button>
    <button onclick="switchView('chat')" data-view="chat" class="sidebar-btn flex items-center gap-2.5 px-3 py-2.5 rounded-xl border border-violet-500/10 bg-nxbg/30 text-sm text-left w-full">
      <span class="text-base">💬</span><span class="font-heading text-nxtxt">Free Chat</span>
    </button>
    <div class="mt-4 text-[10px] uppercase tracking-widest text-nxtxt2/50 font-heading mb-1 px-2">Recent</div>
    <div class="space-y-1">
      <div class="px-3 py-2 rounded-lg text-xs text-nxtxt2 hover:bg-nxbg/30 cursor-pointer transition-colors truncate">"Cash flow forecast..."</div>
      <div class="px-3 py-2 rounded-lg text-xs text-nxtxt2 hover:bg-nxbg/30 cursor-pointer transition-colors truncate">"Overdue invoices..."</div>
      <div class="px-3 py-2 rounded-lg text-xs text-nxtxt2 hover:bg-nxbg/30 cursor-pointer transition-colors truncate">"Widget-B pricing..."</div>
      <div class="px-3 py-2 rounded-lg text-xs text-nxtxt2 hover:bg-nxbg/30 cursor-pointer transition-colors truncate">"February P&L..."</div>
    </div>
    <div class="mt-auto pt-4 border-t border-violet-500/10 px-2">
      <div class="text-[10px] text-nxtxt2/40 font-mono-num">Nexa ERP v0.1-alpha</div>
      <div class="text-[10px] text-nxtxt2/30 font-mono-num">Concept C: Conversation Canvas</div>

<script>
// ========== GLOBAL STATE ==========
let currentView = 'briefing';
let charts = {};
let analysisShown = {};

// ========== HELPER FUNCTIONS ==========
function ai(html) {
  return `<div class="msg-enter flex gap-3 items-start"><div class="w-8 h-8 rounded-xl flex-shrink-0 flex items-center justify-center mt-1" style="background: linear-gradient(135deg, rgba(20,184,166,0.3), rgba(139,92,246,0.3));"><span class="text-sm">✦</span></div><div class="flex-1 ai-border-left pl-4 py-1"><div class="text-sm leading-relaxed">${html}</div></div></div>`;
}

function user(html) {
  return `<div class="msg-enter flex gap-3 items-start justify-end"><div class="user-border-left pl-4 py-1 max-w-[85%]"><div class="text-sm leading-relaxed text-nxtxt/90">${html}</div></div><div class="w-8 h-8 rounded-xl flex-shrink-0 flex items-center justify-center mt-1 bg-nxuser border border-violet-500/10"><span class="text-xs font-bold text-nxtxt2">SC</span></div></div>`;
}

function card(html, extraClass = '') {
  return `<div class="card-enter gradient-border rounded-2xl bg-nxsurface/80 backdrop-blur-sm p-5 my-3 ${extraClass}">${html}</div>`;
}

function pill(status) {
  const m = { OVERDUE: 'status-overdue', 'DUE SOON': 'status-due', PAID: 'status-paid', DRAFT: 'status-draft', POSTED: 'status-posted' };
  return `<span class="px-2.5 py-0.5 rounded-full text-[11px] font-bold font-mono-num ${m[status] || 'status-draft'}">${status}</span>`;
}

function num(v, cls = '') { return `<span class="font-mono-num ${cls}">${v}</span>`; }

function kpiBox(label, value, change, isPositive) {
  const color = isPositive ? 'text-nxpos' : 'text-nxneg';
  const arrow = isPositive ? '▲' : '▼';
  return `<div class="flex-1 p-3 rounded-xl bg-nxbg/50"><div class="text-[11px] text-nxtxt2 mb-1">${label}</div><div class="font-mono-num text-xl font-medium text-nxtxt">${value}</div><div class="font-mono-num text-xs ${color} mt-1">${arrow} ${change}</div></div>`;
}

function typingIndicator() {
  return `<div class="flex gap-3 items-start my-2"><div class="w-8 h-8 rounded-xl flex-shrink-0 flex items-center justify-center" style="background: linear-gradient(135deg, rgba(20,184,166,0.3), rgba(139,92,246,0.3));"><span class="text-sm">✦</span></div><div class="flex gap-1.5 items-center pl-4 py-3"><span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span></div></div>`;
}

function checkSvg() {
  return `<svg class="w-5 h-5" viewBox="0 0 52 52"><circle class="check-circle" cx="26" cy="26" r="25" fill="none" stroke="#14b8a6" stroke-width="2"/><path class="check-mark" fill="none" stroke="#14b8a6" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" d="M14.1 27.2l7.1 7.2 16.7-16.8"/></svg>`;
}

function scrollToBottom() {
  const el = document.getElementById('convStream');
  setTimeout(() => { el.scrollTo({ top: el.scrollHeight, behavior: 'smooth' }); }, 50);
}

function setQuickReplies(replies) {
  const el = document.getElementById('quickReplies');
  el.innerHTML = replies.map(r => `<button onclick="handleQuickReply('${r.replace(/'/g, "\\'")}')" class="quick-reply px-3 py-1.5 rounded-full border border-violet-500/20 bg-nxbg/50 text-xs text-nxtxt2 hover:text-nxtxt font-heading">${r}</button>`).join('');
}

function handleChat() {
  const input = document.getElementById('chatInput');
  const val = input.value.trim();
  if (!val) return;
  input.value = '';
  const content = document.getElementById('convContent');
  content.innerHTML += user(val);
  scrollToBottom();
  setTimeout(() => {
    content.innerHTML += ai("I'd be happy to help with that! In this prototype, try clicking the Quick Actions on the right sidebar to explore different conversation views.");
    scrollToBottom();
  }, 1000);
}

function handleQuickReply(text) {
  const input = document.getElementById('chatInput');
  input.value = text;
  handleChat();
}

// ========== VIEW: MORNING BRIEFING ==========
function renderBriefing() {
  const c = document.getElementById('convContent');
  c.innerHTML = '';
  let delay = 0;

  setTimeout(() => {
    c.innerHTML += ai(`Good morning, Sarah! <span class="text-lg">☀️</span> Here's your <strong>Monday briefing</strong> for Meridian Manufacturing.`);
    scrollToBottom();
  }, delay += 300);

  // Card 1: Revenue & Performance
  setTimeout(() => {
    c.innerHTML += ai(card(`
      <div class="flex items-center gap-2 mb-4">
        <div class="w-2 h-2 rounded-full bg-nxteal"></div>
        <span class="text-xs uppercase tracking-wider text-nxtxt2 font-heading">Revenue & Performance</span>
      </div>
      <div class="grid grid-cols-2 gap-4 mb-4">
        ${kpiBox('Revenue (Feb)', '£347,200', '11.0% vs Jan', true)}
        ${kpiBox('Gross Margin', '34.2%', '2.6pp vs Jan', false)}
      </div>
      <div class="grid grid-cols-2 gap-4 mb-4">
        <div class="h-16"><canvas id="sparkRevenue"></canvas></div>
        <div class="h-16"><canvas id="sparkMargin"></canvas></div>
      </div>
      <div class="flex items-start gap-2 p-3 rounded-xl bg-nxwarn/5 border border-nxwarn/10">
        <span class="text-nxwarn text-sm mt-0.5">⚠️</span>
        <span class="text-xs text-nxtxt2">Revenue strong but margins are compressing — <strong class="text-nxtxt">Widget-B raw material costs up 14%</strong> since October.</span>
      </div>
    `));
    scrollToBottom();
    renderSparklines();
  }, delay += 600);

  // Card 2: Cash Position
  setTimeout(() => {
    c.innerHTML += ai(card(`
      <div class="flex items-center gap-2 mb-4">
        <div class="w-2 h-2 rounded-full bg-nxteal"></div>
        <span class="text-xs uppercase tracking-wider text-nxtxt2 font-heading">Cash Position</span>
      </div>
      <div class="grid grid-cols-2 gap-4 mb-4">
        ${kpiBox('Current Balance', '£89,300', '12.9% vs Jan', false)}
        ${kpiBox('Forecast Min (Wk 6)', '£41,200', 'Below £45k', false)}
      </div>
      <div class="h-32 mb-3"><canvas id="cashMini"></canvas></div>
      <div class="flex items-start gap-2 p-3 rounded-xl bg-nxneg/5 border border-nxneg/10 mb-3">
        <span class="text-nxneg text-sm mt-0.5">⚠️</span>
        <span class="text-xs text-nxtxt2">Cash will dip to <strong class="text-nxneg font-mono-num">£41,200</strong> in week 6 when quarterly VAT payment (£21,500) is due.</span>
      </div>
      <button onclick="switchView('cashflow')" class="text-xs font-heading px-4 py-2 rounded-lg border border-violet-500/20 hover:border-violet-500/40 text-nxtxt2 hover:text-nxtxt transition-all">View Full Forecast →</button>
    `));
    scrollToBottom();
    renderCashMini();
  }, delay += 700);

  // Card 3: Action Items
  setTimeout(() => {
    c.innerHTML += ai(card(`
      <div class="flex items-center gap-2 mb-4">
        <div class="w-2 h-2 rounded-full bg-nxviolet"></div>
        <span class="text-xs uppercase tracking-wider text-nxtxt2 font-heading">Today's Action Items</span>
        <span class="ml-auto font-mono-num text-[11px] text-nxtxt2/50">4 items</span>
      </div>
      <div class="space-y-2">
        <div class="flex items-center gap-3 p-3 rounded-xl bg-nxbg/40 hover:bg-nxbg/60 transition-colors cursor-pointer group">
          <input type="checkbox" class="w-4 h-4 rounded accent-teal-500">
          <div class="flex-1"><div class="text-sm">Chase 3 overdue invoices</div><div class="font-mono-num text-xs text-nxneg">£55,000 at risk</div></div>
          <button onclick="switchView('invoices')" class="text-[11px] px-3 py-1 rounded-lg border border-nxteal/20 text-nxteal opacity-0 group-hover:opacity-100 transition-opacity hover:bg-nxteal/10">Chase Now →</button>
        </div>
        <div class="flex items-center gap-3 p-3 rounded-xl bg-nxbg/40 hover:bg-nxbg/60 transition-colors cursor-pointer group">
          <input type="checkbox" class="w-4 h-4 rounded accent-teal-500">
          <div class="flex-1"><div class="text-sm">Review Widget-B pricing</div><div class="text-xs text-nxtxt2">Margin impact analysis needed</div></div>
          <button class="text-[11px] px-3 py-1 rounded-lg border border-nxteal/20 text-nxteal opacity-0 group-hover:opacity-100 transition-opacity hover:bg-nxteal/10">Analyse →</button>
        </div>
        <div class="flex items-center gap-3 p-3 rounded-xl bg-nxbg/40 hover:bg-nxbg/60 transition-colors cursor-pointer group">
          <input type="checkbox" class="w-4 h-4 rounded accent-teal-500">
          <div class="flex-1"><div class="text-sm">Approve 2 purchase orders</div><div class="font-mono-num text-xs text-nxtxt2">£8,400 total</div></div>
          <button class="text-[11px] px-3 py-1 rounded-lg border border-nxteal/20 text-nxteal opacity-0 group-hover:opacity-100 transition-opacity hover:bg-nxteal/10">View POs →</button>
        </div>
        <div class="flex items-center gap-3 p-3 rounded-xl bg-nxbg/40 hover:bg-nxbg/60 transition-colors cursor-pointer group">
          <input type="checkbox" class="w-4 h-4 rounded accent-teal-500">
          <div class="flex-1"><div class="text-sm">Payroll preparation</div><div class="text-xs text-nxwarn">5 days until next run</div></div>
          <button class="text-[11px] px-3 py-1 rounded-lg border border-nxteal/20 text-nxteal opacity-0 group-hover:opacity-100 transition-opacity hover:bg-nxteal/10">Review →</button>
        </div>
      </div>
    `));
    scrollToBottom();
  }, delay += 600);

  // Card 4: AR Snapshot
  setTimeout(() => {
    c.innerHTML += ai(card(`
      <div class="flex items-center gap-2 mb-4">
        <div class="w-2 h-2 rounded-full bg-nxneg"></div>
        <span class="text-xs uppercase tracking-wider text-nxtxt2 font-heading">Accounts Receivable Aging</span>

function renderCashFlowChart() {
  const ctx = document.getElementById('cashFlowChart');
  if (!ctx) return;
  charts.cashFlow = new Chart(ctx, {
    type: 'line',
    data: {
      labels: ['Now', 'Week 1', 'Week 2', 'Week 3', 'Week 4', 'Week 5', 'Week 6', 'Week 7', 'Week 8'],
      datasets: [
        {
          label: 'Closing Balance',
          data: [89.3, 94.9, 42.7, 61.7, 57.7, 54.7, 41.2, 62.2, 68.2],
          borderColor: '#14b8a6',
          borderWidth: 2.5,
          fill: true,
          backgroundColor: (ctx2) => {
            const gradient = ctx2.chart.ctx.createLinearGradient(0, 0, 0, 250);
            gradient.addColorStop(0, 'rgba(20,184,166,0.15)');
            gradient.addColorStop(1, 'rgba(20,184,166,0.0)');
            return gradient;
          },
          tension: 0.35,
          pointRadius: 5,
          pointHoverRadius: 7,
          pointBackgroundColor: (ctx2) => ctx2.raw < 45 ? '#f87171' : '#14b8a6',
          pointBorderColor: (ctx2) => ctx2.raw < 45 ? '#f87171' : '#14b8a6',
          pointBorderWidth: 2
        },
        {
          label: 'Threshold',
          data: Array(9).fill(40),
          borderColor: 'rgba(248,113,113,0.35)',
          borderWidth: 1.5,
          borderDash: [6, 4],
          pointRadius: 0,
          fill: false
        }
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: { label: c => c.dataset.label + ': £' + c.raw.toFixed(1) + 'k' },
          backgroundColor: '#1a1730',
          titleColor: '#e2e8f0',
          bodyColor: '#94a3b8',
          borderColor: 'rgba(139,92,246,0.2)',
          borderWidth: 1
        }
      },
      scales: {
        x: { ticks: { color: '#94a3b8', font: { size: 10, family: 'DM Mono' } }, grid: { display: false } },
        y: {
          min: 20,
          ticks: { color: '#94a3b8', font: { size: 10, family: 'DM Mono' }, callback: v => '£' + v + 'k' },
          grid: { color: 'rgba(139,92,246,0.05)' }
        }
      }
    }
  });
}

// ========== VIEW: FREE CHAT ==========
function renderChat() {
  const c = document.getElementById('convContent');
  c.innerHTML = '';
  let delay = 0;

  setTimeout(() => {
    c.innerHTML += ai(`What would you like to explore, Sarah? I can help with invoices, reports, stock levels, customer info, or anything else about your business. 💬`);
    setQuickReplies(['Revenue trends', 'Customer balances', 'Stock levels', 'Upcoming payments']);
    scrollToBottom();
  }, delay += 400);
}

// ========== VIEW SWITCHING ==========
function switchView(view) {
  // Destroy existing charts
  Object.values(charts).forEach(ch => { if (ch && ch.destroy) ch.destroy(); });
  charts = {};
  analysisShown = {};

  currentView = view;

  // Update sidebar buttons
  document.querySelectorAll('.sidebar-btn').forEach(btn => {
    btn.classList.remove('active');
    if (btn.dataset.view === view) btn.classList.add('active');
  });

  // Clear quick replies
  document.getElementById('quickReplies').innerHTML = '';

  // Render the selected view
  switch (view) {
    case 'briefing': renderBriefing(); break;
    case 'invoices': renderInvoices(); break;
    case 'create': renderCreateInvoice(); break;
    case 'reports': renderReports(); break;
    case 'cashflow': renderCashFlow(); break;
    case 'chat': renderChat(); break;
  }
}

// ========== INIT ==========
document.addEventListener('DOMContentLoaded', () => {
  switchView('briefing');
});
</script>
