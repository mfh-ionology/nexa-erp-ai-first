name: rewrite-story-splits
description: "Rewrite a story file by splitting flagged tasks based on complexity assessment recommendations"
author: "BMad Orchestrator"

# Input parameters - passed by bash script
inputs:
  story_file_path: ""        # Required: path to original story markdown file
  split_recommendations: ""  # Required: JSON from assess-story-complexity output
  output_path: ""            # Optional: path for new story file (default: original-v2.md)

# Output format - path to new story file
output_format: text
output: path_to_new_story_file

# Workflow components
installed_path: "{project-root}/auto-bmad_pack/workflows/rewrite-story-splits"
instructions: "{installed_path}/instructions.md"

# No template - this is an action workflow
template: false
standalone: true

# Agent persona for rewriting
agent_role: "SM"
agent_instruction: "Apply SM (Scrum Master) principles when splitting tasks - maintain story structure, preserve acceptance criteria mappings, ensure clear developer handoffs"
