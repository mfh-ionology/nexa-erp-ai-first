name: generate-frontend-test-plan
description: "Generate E2E user journey test plan from epic stories and UX design spec for browser-based testing."
author: "BMad Orchestrator"

# Input parameters - passed by bash script
inputs:
  epic_id: ""          # Required: epic identifier (e.g., "1")
  epic_file_path: ""   # Required: path to epic markdown file
  stories_dir: ""      # Required: path to stories directory
  project_root: ""     # Required: path to project root
  ux_spec_path: ""     # Optional: path to UX design specification

# Output format - JSON written to file
output_format: json
output_schema:
  epic_id: string
  journeys:
    - id: string
      name: string
      description: string
      priority: "critical|high|medium"
      related_stories: string[]
      steps:
        - step_number: number
          action: string
          target: string
          input_data: object
          expected_result: string
          screenshot: boolean
          visual_check: string  # Optional: what to visually verify in the screenshot

# Workflow components
installed_path: "{project-root}/auto-bmad_pack/workflows/generate-frontend-test-plan"
instructions: "{installed_path}/instructions.md"

template: false
standalone: true
