name: fix-build-errors
description: "Analyze build error output, identify root causes, and fix TypeScript/ESM/import errors across the monorepo."
author: "BMad Orchestrator"

# Input parameters - passed by bash script
inputs:
  build_error_log: "" # Required: path to file containing build error output
  project_root: ""    # Required: path to project root directory

# Output format - JSON written to stdout
output_format: json
output_schema:
  status: "fixed|partial|needs_human"
  files_modified:
    - file_path: string
      change_description: string
  errors_remaining:
    - error: string
      file: string
      reason: string
  build_verified: boolean

# Workflow components
installed_path: "{project-root}/auto-bmad_pack/workflows/fix-build-errors"
instructions: "{installed_path}/instructions.md"

template: false
standalone: true
