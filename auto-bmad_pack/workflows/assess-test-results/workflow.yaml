name: assess-test-results
description: "Analyze test results to determine verdict, identify critical failures, and recommend next action."
author: "BMad Orchestrator"

# Input parameters - passed by bash script
inputs:
  test_results_file: "" # Required: path to test results JSON file
  test_type: ""         # Required: "backend" or "frontend"

# Output format - JSON written to stdout
output_format: json
output_schema:
  verdict: "pass|partial|fail"
  test_type: string
  critical_failures:
    - test_name: string
      endpoint_or_journey: string
      severity: "critical|high|medium"
      description: string
  action: "proceed|fix|escalate"
  summary: string

# Decision thresholds
thresholds:
  pass_rate_proceed: 95    # >= 95% pass rate = proceed
  pass_rate_fix: 70        # 70-94% pass rate = fix
  pass_rate_escalate: 70   # < 70% pass rate = escalate

# Workflow components
installed_path: "{project-root}/auto-bmad_pack/workflows/assess-test-results"
instructions: "{installed_path}/instructions.md"

template: false
standalone: true
