name: generate-backend-test-plan
description: "Generate a comprehensive API test plan by analyzing epic stories, route files, and DB schema for a completed epic."
author: "BMad Orchestrator"

# Input parameters - passed by bash script
inputs:
  epic_id: ""          # Required: epic identifier (e.g., "1")
  epic_file_path: ""   # Required: path to epic markdown file
  stories_dir: ""      # Required: path to stories directory
  project_root: ""     # Required: path to project root

# Output format - JSON written to file
output_format: json
output_schema:
  epic_id: string
  endpoints:
    - method: string
      path: string
      description: string
      test_cases:
        - name: string
          type: "happy_path|validation|error|edge_case"
          request:
            method: string
            url: string
            headers: object
            body: object
          expected:
            status: number
            body_contains: string[]
            body_schema: object
          db_verification:
            enabled: boolean
            query: string
            expected: string

# Workflow components
installed_path: "{project-root}/auto-bmad_pack/workflows/generate-backend-test-plan"
instructions: "{installed_path}/instructions.md"

template: false
standalone: true
