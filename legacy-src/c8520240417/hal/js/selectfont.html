<!DOCTYPE html>
<html style='height:100%; margin:0; padding:0;'>
 <head>
  <link href='hob:listbox.css' rel='stylesheet'>
  <script src='hob:jquery-3.7.1.slim.min.js'></script>
  <script src='hob:listbox.js'></script>
  <script src='hob:jquery.colpicker.js'></script>
  <script src='hob:jquery.simplepalette.js'></script>

 </head>
 <body style='height:100%; margin:0; padding:0;' id='body'>
  <div style='display:grid; grid-template-columns:200px 50px; grid-template-rows:66% auto; column-gap:1em; height:100%; font-size:9pt;'>
   <div class='font-family'>
    <span value='Andale Mono'><span style='font-family:Andale Mono'>Andal&eacute; Mono</span></span>
    <span value='Arial'><span style='font-family:Arial'>Arial</span></span>
    <span value='Arial Black'><span style='font-family:Arial Black'>Arial Black</span></span>
    <span value='Baskerville'><span style='font-family:Baskerville'>Baskerville</span></span>
    <span value='Bradley Hand'><span style='font-family:Bradley Hand'>Bradley Hand</span></span>
    <span value='Brush Script MT'><span style='font-family:Brush Script MT'>Brush Script MT</span></span>
    <span value='Comic Sans MS'><span style='font-family:Comic Sans MS'>Comic Sans MS</span></span>
    <span value='Courier'><span style='font-family:Courier'>Courier</span></span>
    <span value='Georgia'><span style='font-family:Georgia'>Georgia</span></span>
    <span value='Gill Sans'><span style='font-family:Gill Sans'>Gill Sans</span></span>
    <span value='Helvetica'><span style='font-family:Helvetica'>Helvetica</span></span>
    <span value='Impact'><span style='font-family:Impact'>Impact</span></span>
    <span value='Lucida'><span style='font-family:Lucida'>Lucida</span></span>
    <span value='Luminari'><span style='font-family:Luminari'>Luminari</span></span>
    <span value='Monaco'><span style='font-family:Monaco'>Monaco</span></span>
    <span value='Palatino'><span style='font-family:Palatino'>Palatino</span></span>
    <span value='Tahoma'><span style='font-family:Tahoma'>Tahoma</span></span>
    <span value='Times New Roman'><span style='font-family:Times New Roman'>Times New Roman</span></span>
    <span value='Trebuchet MS'><span style='font-family:Trebuchet MS'>Trebuchet MS</span></span>
    <span value='Verdana'><span style='font-family:Verdana'>Verdana</span></span>
   </div>
   <div class='font-size'></div>
   <div style='grid-column-start: span 2;'><input class='font-color' type='text' value='$SELECTEDFCOLOR'></div>
   <script>
    $(document).ready(function() {
      var fontsizes_arr = [8,9,10,11,12,14,16,18,20,22,24,28,36,48,72,144,288];
      var fontchange_cb = function() {
        HansaWorld.selFont($('.font-family').data('selectedVal'),$('.font-size').data('selectedVal'),$('.font-color').val());
      };
      
      fontsizes_arr.forEach((el) => $('<span>').attr('value','' + el).text('' + el).appendTo($('.font-size')));

      var fntsel = '$SELECTEDFONT';
      $('.font-family').children().each(function (index) {
        var fnt = $(this).attr('value').toLowerCase();
        fntsel = fntsel.toLowerCase();
        if (fnt===fntsel) {
          $(this).attr('selected','');
        };
      });
      
      var szsel = $SELECTEDSZ;
      $('.font-size').children().each(function (index) {
        var sz = $(this).attr('value');
        if (parseInt(sz)===parseInt(szsel)) {
          $(this).attr('selected','');
        };
      });

      $('.font-family').listbox({
        searchbar: true
      });
      $('.font-size').listbox({
        searchbar: false
      });
      
      $('.font-color').colpicker({
        showInput: false,
        hiddable: false,
        width: '100%',
        outputHex: true
      });

      
      $('.font-family').change(fontchange_cb);
      $('.font-size').change(fontchange_cb);
      $('.font-color').change(fontchange_cb);
    });
   </script>
  </div>
 </body>
</html>
